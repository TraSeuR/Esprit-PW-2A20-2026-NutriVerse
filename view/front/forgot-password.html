<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NutriVerse – Réinitialisez votre mot de passe." />
    <title>Mot de passe oublié – NutriVerse</title>

    <!-- Shared stylesheet -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- Page-level overrides: centered single-card layout -->
    <style>
        .forgot-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            /* Subtle pattern background */
            background:
                radial-gradient(ellipse at 20% 50%, rgba(76, 175, 80, .07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(46, 125, 50, .06) 0%, transparent 60%),
                var(--clr-bg);
        }

        .forgot-card {
            background: var(--clr-surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--clr-border);
            padding: 48px 44px;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .forgot-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .forgot-logo-icon {
            width: 40px;
            height: 40px;
            background: var(--clr-primary-soft);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .forgot-logo-text {
            font-family: var(--font-head);
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--clr-primary);
        }

        .forgot-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--clr-text);
            margin-bottom: 8px;
        }

        .forgot-card .subtitle {
            color: var(--clr-text-muted);
            font-size: .9rem;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .forgot-card .form-group {
            text-align: left;
        }

        .forgot-back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--clr-text-muted);
            font-size: .875rem;
            font-weight: 500;
            margin-top: 20px;
            transition: color var(--transition);
        }

        .forgot-back-link:hover {
            color: var(--clr-primary);
        }

        @media (max-width: 500px) {
            .forgot-card {
                padding: 32px 22px;
            }
        }
    </style>
</head>

<body>

    <!-- ════════════════════════════════════════════════════════════
       FORGOT PASSWORD – centered card page
  ════════════════════════════════════════════════════════════ -->
    <main class="forgot-page">
        <div class="forgot-card">

            <!-- Logo -->
            <a href="front.html" class="forgot-logo" style="text-decoration:none;">
                <img src="images/logo.png" alt="NutriVerse Logo"
                    style="width:40px;height:40px;object-fit:contain;border-radius:10px;" />
                <span class="forgot-logo-text">NutriVerse</span>
            </a>

            <!-- Icon -->
            <div class="forgot-icon-wrap">
                🔑
            </div>

            <!-- Heading -->
            <h1>Mot de passe oublié ?</h1>
            <p class="subtitle">
                Entrez votre adresse e-mail et nous vous enverrons
                un lien pour réinitialiser votre mot de passe.
            </p>

            <!-- Forgot password form
           PHP MVC: action="<?= BASE_URL ?>/utilisateur/forgot-password"  method="POST" -->
            <form id="form-forgot" action="#" method="POST" novalidate>

                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="form-label">Adresse e-mail</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input class="form-input" type="email" id="email" name="email" placeholder="votre@email.com"
                            autocomplete="email" required />
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btn-send-reset"
                    style="margin-top:8px;">
                    Envoyer le lien de réinitialisation ✉️
                </button>

                <!-- Info note -->
                <div class="alert alert-info" style="margin-top:20px; text-align:left;">
                    ℹ️ &nbsp;Si l'adresse e-mail est associée à un compte, vous recevrez un e-mail dans quelques
                    minutes.
                </div>

            </form>

            <!-- Back to login -->
            <!-- PHP MVC: href="<?= BASE_URL ?>/utilisateur/login" -->
            <a href="login.html" class="forgot-back-link">
                ← Retour à la connexion
            </a>

        </div>
    </main>

</body>

</html>
